site_name: My Docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    - scheme: slate
      primary: pink
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    #- navigation.tabs
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Getting started:
      - Setting up your development environment: getting-started/dev-environment.md
      - Project structure: getting-started/project-structure.md
  - Contributing:
      - Workflow: contributing/workflow.md
      - Style guide: contributing/style-guide.md
  - Guides:
      - Creating network diagrams with graphs: guides/network-graph.md
      - Creating network diagrams with architecture diagrams: guides/network-architecture.md
      - Creating sequence diagrams: guides/sequence-diagram.md

markdown_extensions:
  - toc
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # format: !!python/name:mermaid2.fence_mermaid_custom
          format: !!python/name:mermaid2.fence_mermaid

plugins:
  - search:
      lang: en
  - mermaid2:
      version: 11.1.0  # min version for architecture diagrams
